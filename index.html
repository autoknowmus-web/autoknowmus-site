<!DOCTYPE html>
<html>
<head>
  <title>AutoKnowmus Price Checker</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h1>🚗 AutoKnowmus Price Checker</h1>

  <!-- DROPDOWNS -->
  <select id="brand">
    <option>Select Brand</option>
    <option value="Maruti">Maruti</option>
    <option value="Honda">Honda</option>
    <option value="Toyota">Toyota</option>
  </select>

  <select id="model">
    <option>Select Model</option>
  </select>

  <select id="year">
    <option value="2023">2023</option>
    <option value="2022">2022</option>
    <option value="2021">2021</option>
    <option value="2020">2020</option>
  </select>

  <select id="fuel">
    <option value="Petrol">Petrol</option>
    <option value="Diesel">Diesel</option>
  </select>

  <br><br>

  <!-- NEW INPUT -->
  <input id="km" type="number" placeholder="KM Driven" />

  <br><br>

  <button onclick="getPrice()">Get Price</button>

  <h2 id="result"></h2>

<script>

// ================== DATA ==================
const carData = {
  Maruti: {
    Swift: 600000,
    Baleno: 700000
  },
  Honda: {
    City: 1200000,
    Amaze: 800000
  },
  Toyota: {
    Corolla: 1500000,
    Innova: 2000000
  }
};

// ================== MODEL DROPDOWN ==================
const brandSelect = document.getElementById("brand");
const modelSelect = document.getElementById("model");

brandSelect.addEventListener("change", () => {
  modelSelect.innerHTML = '<option>Select Model</option>';
  const models = carData[brandSelect.value];

  for (let model in models) {
    let option = document.createElement("option");
    option.value = model;
    option.text = model;
    modelSelect.add(option);
  }
});

// ================== PRICE FUNCTION ==================
function getPrice() {

  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;
  const year = document.getElementById("year").value;
  const fuel = document.getElementById("fuel").value;
  const km = document.getElementById("km").value;

  if (!brand || !model || !year || !fuel || !km) {
    alert("Please fill all fields");
    return;
  }

  let basePrice = carData[brand][model];

  // ================== DEPRECIATION ==================
  const currentYear = new Date().getFullYear();
  const age = currentYear - year;
  let depreciation = Math.pow(0.90, age);

  // ================== DEMAND ==================
  let demandFactor = {
    Toyota: 1.1,
    Honda: 1.05,
    Maruti: 1.0
  }[brand];

  // ================== FUEL ==================
  let fuelFactor = {
    Petrol: 1.0,
    Diesel: 1.05
  }[fuel];

  // ================== KM LOGIC (NEW SMART) ==================
  let mileageFactor;

  if (km < 30000) mileageFactor = 1.05;
  else if (km < 70000) mileageFactor = 1.0;
  else mileageFactor = 0.90;

  // ================== FINAL PRICE ==================
  let price = basePrice * depreciation * demandFactor * fuelFactor * mileageFactor;

  document.getElementById("result").innerText =
    "Estimated Price: ₹ " + Math.round(price).toLocaleString();
}

</script>

</body>
</html>
