<!DOCTYPE html>
<html>
<head>
  <title>AutoKnowmus Price Checker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    select, input, button {
      padding: 8px;
      margin: 5px;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🚗 AutoKnowmus Price Checker</h1>

  <!-- DROPDOWNS -->
  <div>
    <select id="brand">
      <option>Maruti</option>
      <option>Hyundai</option>
      <option>Honda</option>
      <option>Toyota</option>
    </select>

    <select id="model">
      <option>Swift</option>
      <option>i20</option>
      <option>City</option>
      <option>Corolla</option>
    </select>

    <select id="year">
      <script>
        for (let y = 2024; y >= 2005; y--) {
          document.write(`<option>${y}</option>`);
        }
      </script>
    </select>

    <select id="fuel">
      <option>Petrol</option>
      <option>Diesel</option>
      <option>CNG</option>
    </select>
  </div>

  <!-- KM INPUT -->
  <div>
    <input type="number" id="km" placeholder="Enter KM driven" />
  </div>

  <!-- BUTTON -->
  <div>
    <button onclick="getPrice()">Get Price</button>
  </div>

  <!-- RESULT -->
  <div id="result"></div>

  <script>
    function getPrice() {

      let brand = document.getElementById("brand").value;
      let model = document.getElementById("model").value;
      let year = document.getElementById("year").value;
      let fuel = document.getElementById("fuel").value;
      let km = document.getElementById("km").value;

      if (!km) {
        alert("Please enter KM");
        return;
      }

      // BASE PRICE LOGIC
      let basePrice = 500000;

      let age = 2026 - year;
      let depreciation = 1 - (age * 0.05);
      if (depreciation < 0.3) depreciation = 0.3;

      let demandFactor = {
        "Maruti": 1.0,
        "Hyundai": 0.95,
        "Honda": 1.1,
        "Toyota": 1.2
      }[brand];

      let fuelFactor = {
        "Petrol": 1.0,
        "Diesel": 1.1,
        "CNG": 0.9
      }[fuel];

      let mileageFactor = 1 - (km / 200000);
      if (mileageFactor < 0.5) mileageFactor = 0.5;

      let price = basePrice * depreciation * demandFactor * fuelFactor * mileageFactor;

      document.getElementById("result").innerText =
        "Estimated Price: ₹ " + Math.round(price).toLocaleString();

      // 🔥 SEND TO GOOGLE SHEET
      fetch("https://script.google.com/macros/s/AKfycbzHp_13uXonAWQewxpCCtblG-FSBOEzapekJbKNc8fCeISgHM8cPQ57tyI5KMHZfg6JIg/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          brand: brand,
          model: model,
          year: year,
          fuel: fuel,
          km: km,
          price: price
        }),
        headers: {
          "Content-Type": "application/json"
        }
      });

    }
  </script>

</body>
</html>
