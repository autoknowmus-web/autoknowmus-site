<script>
const carData = {
  Toyota: {
    Corolla: 1200000,
    Camry: 3000000
  },
  Honda: {
    City: 1400000,
    Civic: 2200000
  },
  Maruti: {
    Swift: 800000,
    Baleno: 900000
  }
};

// Populate brand dropdown
const brandSelect = document.getElementById("brand");
const modelSelect = document.getElementById("model");

Object.keys(carData).forEach(brand => {
  let option = document.createElement("option");
  option.value = brand;
  option.text = brand;
  brandSelect.add(option);
});

// Update models when brand changes
brandSelect.addEventListener("change", () => {
  modelSelect.innerHTML = '<option>Select Model</option>';
  const models = carData[brandSelect.value];

  Object.keys(models).forEach(model => {
    let option = document.createElement("option");
    option.value = model;
    option.text = model;
    modelSelect.add(option);
  });
});

// Price calculation
function getPrice() {
  const brand = brandSelect.value;
  const model = modelSelect.value;
  const year = document.getElementById("year").value;
  const fuel = document.getElementById("fuel").value;

  if (!brand || !model || !year || !fuel) {
    alert("Please select all fields");
    return;
  }

  let basePrice = carData[brand][model];

  // Depreciation (10% per year)
  const currentYear = new Date().getFullYear();
  const age = currentYear - year;
  let depreciation = Math.pow(0.90, age);

  // Demand factor
  let demandFactor = {
    Toyota: 1.1,
    Honda: 1.05,
    Maruti: 1.0
  }[brand];

  // Fuel factor
  let fuelFactor = {
    Petrol: 1.0,
    Diesel: 1.05
  }[fuel];

  let price = basePrice * depreciation * demandFactor * fuelFactor;

  document.getElementById("result").innerText =
    "Estimated Price: ₹ " + Math.round(price).toLocaleString();
}
</script>
