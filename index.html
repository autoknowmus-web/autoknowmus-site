<!DOCTYPE html>
<html>
<head>
  <title>AutoKnowmus Price Checker</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

  <h1>🚗 AutoKnowmus Price Checker</h1>

  <select id="brand">
    <option value="">Select Brand</option>
  </select>

  <select id="model">
    <option value="">Select Model</option>
  </select>

  <select id="year">
    <option value="">Select Year</option>
    <script>
      for(let y=2025; y>=2010; y--){
        document.write(`<option value="${y}">${y}</option>`);
      }
    </script>
  </select>

  <select id="fuel">
    <option value="">Select Fuel</option>
    <option>Petrol</option>
    <option>Diesel</option>
  </select>

  <br><br>
  <button onclick="getPrice()">Get Price</button>

  <h2 id="result"></h2>

<script>

// DATA
const carData = {
  Toyota: {
    Corolla: 1200000,
    Camry: 2000000
  },
  Honda: {
    City: 1400000,
    Civic: 2200000
  },
  Maruti: {
    Swift: 800000,
    Baleno: 900000
  }
};

// Populate brands
const brandSelect = document.getElementById("brand");
const modelSelect = document.getElementById("model");

Object.keys(carData).forEach(brand => {
  let option = document.createElement("option");
  option.value = brand;
  option.text = brand;
  brandSelect.add(option);
});

// Update models
brandSelect.addEventListener("change", () => {
  modelSelect.innerHTML = '<option>Select Model</option>';
  const models = carData[brandSelect.value];

  Object.keys(models).forEach(model => {
    let option = document.createElement("option");
    option.value = model;
    option.text = model;
    modelSelect.add(option);
  });
});

// PRICE LOGIC
function getPrice() {
  const brand = brandSelect.value;
  const model = modelSelect.value;
  const year = document.getElementById("year").value;
  const fuel = document.getElementById("fuel").value;

  if (!brand || !model || !year || !fuel) {
    alert("Please select all fields");
    return;
  }

  let basePrice = carData[brand][model];

  const currentYear = new Date().getFullYear();
  const age = currentYear - year;
  let depreciation = Math.pow(0.9, age);

  let demandFactor = {
    Toyota: 1.1,
    Honda: 1.05,
    Maruti: 1.0
  }[brand];

  let fuelFactor = {
    Petrol: 1.0,
    Diesel: 1.05
  }[fuel];

  let price = basePrice * depreciation * demandFactor * fuelFactor;

  document.getElementById("result").innerText =
    "Estimated Price: ₹ " + Math.round(price).toLocaleString();
}

</script>

</body>
</html>
